name: Feature request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        For substantial features or breaking API changes, discuss the approach here before opening a pull request. See [Contributing](https://github.com/rutvik24/react-native-alternate-app-icon/blob/main/CONTRIBUTING.md).

        By participating, you agree to our [Code of Conduct](https://github.com/rutvik24/react-native-alternate-app-icon/blob/main/CODE_OF_CONDUCT.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
      placeholder: We need to switch icons when the user selects a theme without restarting the app...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? API shape, platform behavior, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform scope
      options:
        - iOS
        - Android
        - Both
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: API impact
      options:
        - label: This would be a breaking change to the public API
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      options:
        - label: I am willing to help implement this via a pull request
          required: false
        - label: I agree to follow the project's Code of Conduct
          required: true
