name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0). Leave empty for automated release.'
        required: false
        default: ''
      tag:
        description: 'NPM tag'
        type: choice
        required: true
        default: 'latest'
        options:
          - latest
          - stage
          - next

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.version || 'auto' }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install npm dependencies (bun)
        run: bun install

      - name: Build lib
        run: bun run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: '${{ github.actor }}@users.noreply.github.com'
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: '${{ github.actor }}@users.noreply.github.com'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="${{ github.event.inputs.tag }}"
            
            echo "Starting manual release for version: $VERSION with tag: $TAG"
            
            # Configure Git identity
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            
            # 1. Update version in package.json (no git tag/commit yet)
            # --allow-same-version handles cases where package.json is already at that version
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            
            # 2. Publish to npm
            # Normal 'npm publish' creates the version if not available.
            # Using --provenance for OIDC / Trusted Publishing
            npm publish --tag "$TAG" --provenance --access public
            
            # 3. If publish succeeded, commit the version bump and create the tag
            git add package.json
            git commit -m "chore(release): $VERSION"
            git tag "v$VERSION"
            
            # 4. Push the commit and the tag back to GitHub
            git push origin HEAD --tags
            
            # 5. Create the official GitHub Release
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          else
            echo "Starting automated release via semantic-release"
            # Note: For semantic-release to work with OIDC, you may need a 
            # dummy NPM_TOKEN (e.g. 00000000-0000-0000-0000-000000000000)
            # if the plugin checks for it.
            bun release
          fi
