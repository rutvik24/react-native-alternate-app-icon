name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0). Leave empty for automated release.'
        required: true
        default: ''
      tag:
        description: 'NPM tag'
        type: choice
        required: true
        default: 'latest'
        options:
          - latest
          - stage
          - next

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.version || 'auto' }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install npm dependencies (bun)
        run: bun install

      - name: Build lib
        run: bun run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: '${{ github.actor }}@users.noreply.github.com'
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: '${{ github.actor }}@users.noreply.github.com'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Manual release: ${{ github.event.inputs.version }} with tag ${{ github.event.inputs.tag }}"
            
            # Configure Git
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            
            # Update version in package.json and create git tag
            npm version ${{ github.event.inputs.version }} -m "chore(release): %s"
            
            # Push the commit and the tag
            git push origin HEAD --tags
            
            # Publish to npm with the specified tag
            npm publish --tag ${{ github.event.inputs.tag }} --provenance
            
            # Create GitHub Release
            gh release create v${{ github.event.inputs.version }} --title "v${{ github.event.inputs.version }}" --generate-notes
          else
            echo "Automated release via semantic-release"
            bun release
          fi
